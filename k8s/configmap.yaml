apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-config
  namespace: nekazari
  labels:
    app: odoo
    module: odoo-erp
data:
  ODOO_TEMPLATE_DB: "nkz_odoo_template"

  ORION_URL: "http://orion-ld-service:1026"
  N8N_URL: "http://n8n-service:5678"
  INTELLIGENCE_API_URL: "http://intelligence-api-service:8000"
  REDIS_URL: "redis://redis-service:6379/0"

  KEYCLOAK_URL: "https://auth.robotika.cloud/auth"
  KEYCLOAK_REALM: "nekazari"
  KEYCLOAK_CLIENT_ID: "nekazari-api"

  ALLOWED_ORIGINS_STR: "https://nekazari.robotika.cloud,https://odoo.robotika.cloud"

  ODOO_URL: "https://odoo.robotika.cloud"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-nginx-config
  namespace: nekazari
  labels:
    app: odoo-frontend
    module: odoo-erp
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
