# Returns 403 for database manager/selector paths (security: only backend may create DBs).
# Author: Robotika | License: AGPL-3.0
apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-forbidden-nginx-config
  namespace: nekazari
  labels:
    app: odoo-forbidden
    module: odoo-erp
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      location / {
        return 403;
        add_header Content-Type text/plain;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-forbidden
  namespace: nekazari
  labels:
    app: odoo-forbidden
    module: odoo-erp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo-forbidden
  template:
    metadata:
      labels:
        app: odoo-forbidden
        module: odoo-erp
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: odoo-forbidden-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: odoo-forbidden-service
  namespace: nekazari
  labels:
    app: odoo-forbidden
spec:
  selector:
    app: odoo-forbidden
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
